name: security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Run scanner on workflow definitions
        run: python -m mcp_policy_guard scan .github --fail-on high

      - name: Compile sources
        run: python -m compileall src tests
