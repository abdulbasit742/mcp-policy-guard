name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: mcp-policy-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Compile sources
        run: python -m compileall -q src tests

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate example suppression policy
        run: python -m mcp_policy_guard policy validate .mcp-policy-guard.example.json

      - name: Scanner smoke test
        run: python -m mcp_policy_guard scan . --fail-on critical

      - name: Validate SARIF serialization
        run: |
          python -m mcp_policy_guard scan . --format sarif --fail-on critical > mcp-policy-guard.sarif
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("mcp-policy-guard.sarif").read_text(encoding="utf-8"))
          assert report["version"] == "2.1.0"
          assert report["runs"][0]["tool"]["driver"]["name"] == "MCP Policy Guard"
          assert isinstance(report["runs"][0]["results"], list)
          PY
